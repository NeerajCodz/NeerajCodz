name: Update Trophies Card

on:
  schedule:
    - cron: "20 0 * * *"
  workflow_dispatch:

jobs:
  trophies:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Ensure profile directory
        run: mkdir -p profile

      - name: Generate trophies SVG from GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_LOGIN: NeerajCodz
        run: |
          python3 << 'PYEOF'
          import json
          import os
          import urllib.request
          import urllib.parse

          token = os.environ.get("GH_TOKEN", "")
          login = os.environ.get("GH_LOGIN", "NeerajCodz")

          headers = {"User-Agent": "trophies-generator"}
          if token:
              headers["Authorization"] = f"Bearer {token}"

          def get_json(url: str):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=30) as resp:
                  return json.loads(resp.read().decode("utf-8"))

          def get_total_from_search(query: str) -> int:
              q = urllib.parse.quote(query, safe="")
              data = get_json(f"https://api.github.com/search/issues?q={q}&per_page=1")
              return int(data.get("total_count", 0))

          # Base user stats
          user = get_json(f"https://api.github.com/users/{login}")
          followers = int(user.get("followers", 0))
          following = int(user.get("following", 0))
          public_repos = int(user.get("public_repos", 0))
          public_gists = int(user.get("public_gists", 0))

          # Aggregate stars/forks/watchers across repos
          repos = []
          page = 1
          while True:
              batch = get_json(
                  f"https://api.github.com/users/{login}/repos?per_page=100&page={page}&type=owner&sort=updated"
              )
              if not batch:
                  break
              repos.extend(batch)
              if len(batch) < 100:
                  break
              page += 1

          total_stars = sum(int(r.get("stargazers_count", 0)) for r in repos)
          total_forks = sum(int(r.get("forks_count", 0)) for r in repos)
          total_watchers = sum(int(r.get("watchers_count", 0)) for r in repos)

          # PR / Issue counts authored by user
          merged_prs = get_total_from_search(f"type:pr author:{login} is:merged")
          opened_issues = get_total_from_search(f"type:issue author:{login}")

          cards = [
              ("Followers", followers, "Community"),
              ("Total Stars", total_stars, "Impact"),
              ("Public Repos", public_repos, "Builder"),
              ("Following", following, "Network"),
              ("Merged PRs", merged_prs, "Collaboration"),
              ("Opened Issues", opened_issues, "Problem Solver"),
          ]

          width = 1280
          height = 320
          card_w = 395
          card_h = 105
          gap_x = 25
          gap_y = 20
          start_x = 22
          start_y = 82

          def esc(s: str) -> str:
              return (
                  str(s)
                  .replace("&", "&amp;")
                  .replace("<", "&lt;")
                  .replace(">", "&gt;")
              )

          lines = [
              f'<svg xmlns="http://www.w3.org/2000/svg" width="{width}" height="{height}" viewBox="0 0 {width} {height}">',
              '<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#111827"/></linearGradient></defs>',
              '<rect width="100%" height="100%" fill="url(#bg)"/>',
              '<text x="30" y="44" fill="#93c5fd" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="700">GitHub Trophies</text>',
              f'<text x="30" y="68" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="18">Auto-generated for @{esc(login)}</text>',
          ]

          for i, (title, value, subtitle) in enumerate(cards):
              row = i // 3
              col = i % 3
              x = start_x + col * (card_w + gap_x)
              y = start_y + row * (card_h + gap_y)

              lines.extend([
                  f'<rect x="{x}" y="{y}" width="{card_w}" height="{card_h}" rx="14" fill="#0b1220" stroke="#334155"/>',
                  f'<text x="{x+18}" y="{y+32}" fill="#a5b4fc" font-family="Segoe UI, Arial, sans-serif" font-size="18">{esc(title)}</text>',
                  f'<text x="{x+18}" y="{y+70}" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">{esc(value)}</text>',
                  f'<text x="{x+18}" y="{y+92}" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="14">{esc(subtitle)}</text>',
              ])

          lines.append('</svg>')

          with open("profile/trophies.svg", "w", encoding="utf-8") as f:
              f.write("\n".join(lines))
          PYEOF

      - name: Commit trophies
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git diff --quiet -- profile/trophies.svg && exit 0
          git add profile/trophies.svg
          git commit -m "chore: update trophies card [skip ci]" || exit 0
          git push
