name: Update Stats Cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Ensure profile directory
        run: mkdir -p profile

      - name: Download stats cards
        run: |
          curl -fL --retry 5 --retry-delay 2 --retry-all-errors "https://github-profile-summary-cards.vercel.app/api/cards/stats?username=NeerajCodz&theme=2077" -o profile/stats.svg
          curl -fL --retry 5 --retry-delay 2 --retry-all-errors "https://github-profile-summary-cards.vercel.app/api/cards/productive-time?username=NeerajCodz&theme=2077&utcOffset=5.3" -o profile/productive-time.svg
          curl -fL --retry 5 --retry-delay 2 --retry-all-errors "https://github-profile-summary-cards.vercel.app/api/cards/repos-per-language?username=NeerajCodz&theme=2077" -o profile/top-langs.svg

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/stats.svg profile/productive-time.svg profile/top-langs.svg
          git commit -m "chore: update stats cards [skip ci]" || exit 0
          git push
