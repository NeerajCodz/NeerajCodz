name: Update Profile Metrics

on:
  schedule:
    - cron: "15 0 * * *"
  workflow_dispatch:

concurrency:
  group: profile-readme-update
  cancel-in-progress: false

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Ensure profile directory
        run: mkdir -p profile

      - name: Download metrics SVG
        run: |
          curl -fL --retry 5 --retry-delay 2 --retry-all-errors "https://github-profile-summary-cards.vercel.app/api/cards/profile-details?username=NeerajCodz&theme=2077" -o profile/metrics.svg

      - name: Commit metrics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/metrics.svg
          git commit -m "chore: update profile metrics [skip ci]" || exit 0
          git push
