name: Update Recent Activity

on:
  schedule:
    - cron: "30 */6 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Update activity section
        uses: JamesIves/github-activity-readme@v0.4.6
        with:
          COMMIT_MSG: "chore: update recent activity [skip ci]"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAX_LINES: 8
          TARGET_FILE: README.md
          START_DELIMITER: "<!-- ACTIVITY:START -->"
          END_DELIMITER: "<!-- ACTIVITY:END -->"
