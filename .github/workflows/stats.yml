name: Update README Stats Cards

on:
  schedule:
    - cron: "0 0 * * *"   # Runs once daily at midnight UTC
  workflow_dispatch:        # Allows manual trigger from Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # ── Stats Card ──────────────────────────────────────────────
      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: >-
            username=${{ github.repository_owner }}
            &show_icons=true
            &count_private=true
            &include_all_commits=true
            &theme=github_dark
            &hide_border=true
            &bg_color=0d1117
            &title_color=58a6ff
            &icon_color=58a6ff
            &text_color=c9d1d9
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Top Languages Card (donut layout) ────────────────────────
      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: >-
            username=${{ github.repository_owner }}
            &layout=donut
            &langs_count=8
            &theme=github_dark
            &hide_border=true
            &bg_color=0d1117
            &title_color=58a6ff
            &text_color=c9d1d9
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Commit generated SVGs ────────────────────────────────────
      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "chore: update README stats cards [skip ci]" || exit 0
          git push
