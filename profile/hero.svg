<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 280" role="img" aria-label="Neeraj Sathish Kumar hero banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b132b" />
      <stop offset="50%" stop-color="#1c2541" />
      <stop offset="100%" stop-color="#3a506b" />
      <animate attributeName="x1" values="0;1;0" dur="12s" repeatCount="indefinite" />
      <animate attributeName="x2" values="1;0;1" dur="12s" repeatCount="indefinite" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="50%" stop-color="#c7d2fe" />
      <stop offset="100%" stop-color="#dbeafe" />
      <animate attributeName="x1" values="0;1;0" dur="8s" repeatCount="indefinite" />
      <animate attributeName="x2" values="1;0;1" dur="8s" repeatCount="indefinite" />
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1280" height="280" rx="24" fill="url(#bg)" />

  <circle cx="150" cy="70" r="110" fill="#7dd3fc" fill-opacity="0.08">
    <animate attributeName="cx" values="150;220;150" dur="14s" repeatCount="indefinite" />
  </circle>
  <circle cx="1120" cy="220" r="140" fill="#a78bfa" fill-opacity="0.08">
    <animate attributeName="cy" values="220;170;220" dur="16s" repeatCount="indefinite" />
  </circle>

  <text x="640" y="128" text-anchor="middle" fill="url(#textGrad)" filter="url(#softGlow)"
        font-family="'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif" font-size="64" font-weight="700" letter-spacing="1.2">
    Neeraj Sathish Kumar
    <animate attributeName="opacity" values="0.95;1;0.95" dur="4.5s" repeatCount="indefinite" />
  </text>

  <text x="640" y="185" text-anchor="middle" fill="#dbeafe"
        font-family="'Times New Roman', Georgia, serif" font-size="30" font-style="italic" letter-spacing="0.8">
    Building things that actually matter.
    <animate attributeName="opacity" values="0.75;1;0.75" dur="5.5s" repeatCount="indefinite" />
  </text>
</svg>
